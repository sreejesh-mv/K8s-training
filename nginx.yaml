apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-v1-sree
  namespace: sreejeshm
  annotations:
   kubernetes.io/change-cause: "image tag updating to nginx"
spec:
  replicas: 4
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
     containers:
     - name: c1
       image: nginx
